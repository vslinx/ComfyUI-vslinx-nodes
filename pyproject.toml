[project]
name = "comfyui-vslinx-nodes"
description = "Custom ComfyUI nodes to streamline workflows: load multiple images via a multi-select dialog as a batch or list, or load the last generated image from the output folder with auto-refresh; fit an image inside a mask's bounding box for compositing poses, objects, or decals; convert images to pixel art with retro palettes (GameBoy, CGA, NES, Pico-8); upscale to any exact scale factor using an upscale model (nearest/bilinear/area/Lanczos); decode latents in adjustable batch sizes via batched VAE Decode and VAE Decode (Tiled) to cut peak VRAM; an interactive detailer (Impact-Pack) that pauses for a per-segment prompt dialog; boolean AND/OR/flip plus nodes that bypass or mute downstream nodes from a boolean or by following another node's bypass/mute state for easy workflow branching; pack and unpack up to 5 values through a single pipe wire (Any to Pipe / Pipe to Any) to declutter large graphs; bookmark and jump to workflow groups from a side panel; multiline wildcard text input with dropdown for Impact-Pack; and append LoRA info from rgthree Power LoRA Loader into image metadata. Also includes settings to show hover previews for all models & LoRAs across all model loaders - compatible with rgthree's subdirectory view - and a fix (on by default) for 'Return type mismatch' errors caused by custom nodes like RES4LYF that extend combo lists such as schedulers."
version = "1.10.0"
license = { file = "LICENSE" }

